        const logEl = document.getElementById('log');
        const startBtn = document.getElementById('startBtn');

        function log(msg, type = '') {
            const div = document.createElement('div');
            if (type) div.className = type;
            div.textContent = msg;
            logEl.appendChild(div);
            logEl.scrollTop = logEl.scrollHeight;
        }

        async function startSeeding() {
            startBtn.disabled = true;
            log('Parsing data...');
            
            const lines = studentData.split('\n').filter(l => l.trim());
            const students = lines.map(line => {
                const parts = line.trim().split(/\s+/);
                const matricNo = parts.pop();
                const name = parts.join(' ');
                return { name, matricNo };
            });

            log(`Found ${students.length} students. Starting upload...`);

            let count = 0;
            for (const student of students) {
                try {
                    // Document IDs cannot have slashes, so we replace them with dashes
                    const sanitizedMatric = student.matricNo.trim().toUpperCase().replace(/\//g, '-');
                    
                    await setDoc(doc(db, "authorized_students", sanitizedMatric), {
                        name: student.name.trim(),
                        matricNo: student.matricNo.trim().toUpperCase(), // Keep original for reference
                        authorized: true,
                        updatedAt: new Date()
                    });
                    count++;
                    log(`[${count}/${students.length}] ✅ Added: ${student.name}`, 'success');
                } catch (e) {
                    log(`❌ Error adding ${student.name}: ${e.message}`, 'error');
                }
            }

            log('--- ALL DONE! ---');
            startBtn.textContent = 'Upload Complete';
        }

        startBtn.addEventListener('click', startSeeding);
