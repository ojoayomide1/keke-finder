<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Keke Finder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen center">
    <h1> Keke Finder</h1>
    <p>Veritas University  Abuja</p>

    <div style="width: 85%; max-width: 320px; margin-top: 30px;">
      <input type="email" id="email" placeholder="Email address" class="input-field">
      <input type="password" id="password" placeholder="Password" class="input-field">

      <button type="button" onclick="login()" class="green" style="width:100%; margin: 20px 0 10px; padding: 16px;">
        Login
      </button>

      <button type="button" onclick="showSignup()" style="width:100%; background:#333; color:white; padding: 16px; margin-bottom: 30px;">
        Create New Account
      </button>

      <p style="text-align: center; margin: 20px 0; opacity: 0.8;"> OR </p>

      <button type="button" onclick="continueAs('student')" class="green" style="width:100%; margin-bottom: 12px;">
         Continue as Student
      </button>
      
      <button type="button" onclick="continueAs('rider')" class="yellow" style="width:100%;">
         Continue as Rider
      </button>
    </div>
  </div>

  <!-- ROLE SELECT -->
  <div id="roleSelect" class="screen center hidden">
    <h1> Keke Finder</h1>
    <p>Choose your role</p>
    
    <button type="button" onclick="selectRole('student')" class="green" style="width:80%; max-width:280px;">
       I'm a Student - Find Keke
    </button>
    
    <button type="button" onclick="selectRole('rider')" class="yellow" style="width:80%; max-width:280px;">
       I'm a Rider - Go Online
    </button>
  </div>

  <!-- STUDENT UI -->
  <div id="studentUI" class="screen hidden">
    <div id="studentMap" class="map"></div>
    <button class="backBtn" onclick="goBackToRole()"></button>
    <button class="fab green" id="requestBtn" onclick="requestKeke()"> Request Ride</button>

    <div class="bottomSheet" id="studentSheet">
      <div class="dragZone"></div>
      <div class="handle"></div>
      <h3 id="studentTitle">Waiting...</h3>
      <p id="studentSub">No active ride</p>
      <!-- Students don't get controls - only riders do -->
    </div>
  </div>

  <!-- RIDER UI -->
  <div id="riderUI" class="screen hidden">
    <div id="riderMap" class="map"></div>
    <button class="backBtn" onclick="goBackToRole()"></button>
    <button class="fab yellow" id="goLiveBtn" onclick="becomeAvailable()"> Go Live</button>

    <div class="bottomSheet" id="riderSheet">
      <div class="dragZone"></div>
      <div class="handle"></div>
      <h3 id="riderTitle">Offline</h3>
      <p id="riderSub">Go live to start</p>
      <div class="controls" id="riderControls" style="display:none">
        <button onclick="setArriving()" class="yellow"> Arriving</button>
        <button onclick="completeRide()" class="green"> Complete</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
