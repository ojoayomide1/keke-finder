<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Keke Finder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
</head>
<body>

  <!-- LOGIN SCREEN -->
  <div id="loginScreen" class="screen center">
    <h1> Keke Finder</h1>
    <p>Veritas University  Abuja</p>

    <div class="auth-card">
      <input type="text" id="displayName" placeholder="Full name" class="input-field hidden" autocomplete="name">
      <input type="email" id="email" placeholder="Email address" class="input-field" autocomplete="email">
      <input type="password" id="password" placeholder="Password" class="input-field" autocomplete="current-password">
      <p id="authMessage" class="auth-message"></p>

      <button type="button" id="authSubmitBtn" onclick="login()" class="green auth-primary">
        Login
      </button>

      <button type="button" id="authToggleBtn" onclick="showSignup()" class="auth-secondary">
        Create New Account
      </button>

      <p class="auth-divider">OR</p>

      <button type="button" onclick="continueAs('student')" class="green auth-primary">
         Continue as Student
      </button>
      
      <button type="button" onclick="continueAs('rider')" class="yellow auth-primary">
         Continue as Rider
      </button>
    </div>
  </div>

  <!-- ROLE SELECT -->
  <div id="roleSelect" class="screen center hidden">
    <button type="button" id="logoutBtn" class="logoutBtn hidden" onclick="logout()">Logout</button>
    <h1> Keke Finder</h1>
    <p id="userBadge" class="user-badge hidden"></p>
    <p>Choose your role</p>
    
    <button type="button" onclick="selectRole('student')" class="green" style="width:80%; max-width:280px;">
       I'm a Student - Find Keke
    </button>
    
    <button type="button" onclick="selectRole('rider')" class="yellow" style="width:80%; max-width:280px;">
       I'm a Rider - Go Online
    </button>
  </div>

  <!-- STUDENT UI -->
  <div id="studentUI" class="screen hidden">
    <div id="studentMap" class="map"></div>
    <div id="campusEditor" class="campus-editor hidden">
      <div class="campus-editor__header">
        <strong>Campus Editor</strong>
        <button type="button" id="clearCampusDraftBtn">Clear</button>
      </div>

      <label for="campusPointName">Name</label>
      <input type="text" id="campusPointName" placeholder="Main Gate" autocomplete="off">

      <label for="campusPointType">Mode</label>
      <select id="campusPointType">
        <option value="location">Location marker</option>
        <option value="path">Path / road</option>
        <option value="zone">Zone / boundary</option>
      </select>

      <p id="campusEditorHint">Click the map to capture coordinates.</p>
      <textarea id="campusEditorOutput" readonly spellcheck="false"></textarea>
      <button type="button" id="saveCampusShapeBtn">Save Shape</button>
      <button type="button" id="copyCampusJsonBtn">Copy JSON</button>
    </div>
    <button class="backBtn" onclick="goBackToRole()"></button>
    <button class="fab green" id="requestBtn" onclick="requestKeke()"> Request Ride</button>

    <div class="bottomSheet" id="studentSheet">
      <div class="dragZone"></div>
      <div class="handle"></div>
      <h3 id="studentTitle">Waiting...</h3>
      <p id="studentSub">No active ride</p>
      <!-- Students don't get controls - only riders do -->
    </div>
  </div>

  <!-- RIDER UI -->
  <div id="riderUI" class="screen hidden">
    <div id="riderMap" class="map"></div>
    <button class="backBtn" onclick="goBackToRole()"></button>
    <button class="fab yellow" id="goLiveBtn" onclick="becomeAvailable()"> Go Live</button>

    <div class="bottomSheet" id="riderSheet">
      <div class="dragZone"></div>
      <div class="handle"></div>
      <h3 id="riderTitle">Offline</h3>
      <p id="riderSub">Go live to start</p>
      <div class="controls" id="riderControls" style="display:none">
        <button onclick="setArriving()" class="yellow"> Arriving</button>
        <button onclick="completeRide()" class="green"> Complete</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
