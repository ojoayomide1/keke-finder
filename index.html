<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keke Finder</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

  <h1>🚖 Keke Finder</h1>

  <div class="container">

    <div class="box">
      <h2>Find a Keke</h2>
      <button onclick="requestKeke()">I need a keke</button>
      <p id="studentMsg"></p>
    </div>

    <div class="box">
      <h2>Go Online (Riders)</h2>
      <button onclick="becomeAvailable()">I am available</button>
      <p id="riderMsg"></p>
    </div>

    <div class="box">
      <h2>Available Kekes</h2>
      <ul id="kekeList"></ul>
    </div>
    <div id="map" style="height: 300px; margin: 20px;"></div>
  </div>

  <!-- Firebase + your logic -->
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
<script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="script.js"></script>

</body>
</html>
