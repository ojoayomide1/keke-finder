<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keke Finder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

  <!-- ROLE SELECT -->
  <div id="roleSelect" class="screen center">
    <h1>🚖 Keke Finder</h1>
    <button onclick="selectRole('student')">Find a Keke</button>
    <button onclick="selectRole('rider')">Go Online</button>
  </div>

  <!-- STUDENT UI -->
  <div id="studentUI" class="screen hidden">
    <div id="studentMap" class="map"></div>

    <button class="fab green" onclick="requestKeke()">📍 Request Ride</button>
    <button class="backBtn" onclick="goBack()">←</button>

    <div class="bottomCard">
      <p id="studentMsg">Waiting...</p>
    </div>
  </div>

  <!-- RIDER UI -->
  <div id="riderUI" class="screen hidden">
    <div id="riderMap" class="map"></div>

    <button class="fab yellow" onclick="becomeAvailable()">🚖 Go Live</button>
    <button class="backBtn" onclick="goBack()">←</button>

    <div class="bottomCard">
      <p id="riderMsg">Offline</p>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="script.js"></script>

</body>
</html>
