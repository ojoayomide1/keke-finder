<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keke Finder - Login</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="screen center" style="background: linear-gradient(135deg, #1a1a2e, #16213e);">
    <h1 style="font-size: 2.8rem; margin-bottom: 10px;">🚖 Keke Finder</h1>
    <p style="margin-bottom: 40px; opacity: 0.9;">Veritas University Edition</p>

    <div style="width: 85%; max-width: 320px;">
      <input type="email" id="email" placeholder="Email" class="input">
      <input type="password" id="password" placeholder="Password" class="input">
      
      <button onclick="login()" class="green" style="width:100%; margin: 15px 0;">Login</button>
      
      <button onclick="showSignup()" style="width:100%; background:#333; color:white;">Create Account</button>

      <div style="margin-top: 40px;">
        <p style="margin-bottom: 15px; opacity: 0.8;">Or continue as:</p>
        <button onclick="quickRole('student')" class="green" style="width:100%; margin-bottom:8px;">
          👤 Student - Find Keke
        </button>
        <button onclick="quickRole('rider')" class="yellow" style="width:100%;">
          🛵 Rider - Go Online
        </button>
      </div>
    </div>
  </div>

  <script type="module" src="script.js"></script>
</body>
</html>
