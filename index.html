<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Keke Finder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
</head>
<body>

  <h1>🚖 Keke Finder</h1>

  <!-- ROLE SELECTION -->
  <div id="roleSelect" class="container">
    <div class="box">
      <h2>I am a Student</h2>
      <button onclick="selectRole('student')">Find a Keke</button>
    </div>

    <div class="box">
      <h2>I am a Rider</h2>
      <button onclick="selectRole('rider')">Go Online</button>
    </div>
  </div>

  <!-- STUDENT UI -->
  <div id="studentUI" class="container" style="display:none;">
    <div class="box">
      <h2>Find a Keke</h2>
      <button onclick="requestKeke()">I need a keke 📍</button>
      <p id="studentMsg"></p>
    </div>
  </div>

  <!-- RIDER UI -->
  <div id="riderUI" class="container" style="display:none;">
    <div class="box">
      <h2>Go Online</h2>
      <button onclick="becomeAvailable()">I am available 🚖</button>
      <p id="riderMsg"></p>
    </div>
  </div>

  <!-- MAP (shared) -->
  <div id="map" style="height: 400px;"></div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script type="module" src="script.js"></script>

</body>
</html>
