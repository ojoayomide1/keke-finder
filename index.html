<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
  <title>Keke Finder</title>
  <link rel="stylesheet" href="style.css">
  <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
  <link rel="stylesheet" href="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.css" />
</head>
<body>

  <!-- ROLE SELECT -->
  <div id="roleSelect" class="screen center">
    <h1>🚖 Keke Finder</h1>
    <p>Veritas University - Abuja</p>
    
    <button type="button" onclick="selectRole('student')" class="green" style="width:80%; max-width:280px;">
      👤 I'm a Student - Find Keke
    </button>
    
    <button type="button" onclick="selectRole('rider')" class="yellow" style="width:80%; max-width:280px;">
      🛵 I'm a Rider - Go Online
    </button>
  </div>

  <!-- STUDENT UI -->
  <div id="studentUI" class="screen hidden">
    <div id="studentMap" class="map"></div>
    <button class="backBtn" onclick="goBack()">←</button>
    <button class="fab green" onclick="requestKeke()">🚖 Request Ride</button>

    <div class="bottomSheet" id="studentSheet">
      <div class="dragZone"></div>
      <div class="handle"></div>
      <h3 id="studentTitle">Waiting...</h3>
      <p id="studentSub">No active ride</p>
      <div class="controls" id="studentControls" style="display:none">
        <button onclick="setArriving()" class="yellow">📍 Arriving</button>
        <button onclick="completeRide()" class="green">✅ Complete</button>
      </div>
    </div>
  </div>

  <!-- RIDER UI -->
  <div id="riderUI" class="screen hidden">
    <div id="riderMap" class="map"></div>
    <button class="backBtn" onclick="goBack()">←</button>
    <button class="fab yellow" onclick="becomeAvailable()">🟢 Go Live</button>

    <div class="bottomSheet" id="riderSheet">
      <div class="dragZone"></div>
      <div class="handle"></div>
      <h3 id="riderTitle">Offline</h3>
      <p id="riderSub">Go live to start</p>
      <div class="controls" id="riderControls" style="display:none">
        <button onclick="setArriving()" class="yellow">📍 Arriving</button>
        <button onclick="completeRide()" class="green">✅ Complete</button>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
  <script src="https://unpkg.com/leaflet-routing-machine/dist/leaflet-routing-machine.js"></script>
  <script type="module" src="script.js"></script>
</body>
</html>
