<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>
<title>Keke Finder</title>
<link rel="stylesheet" href="style.css">
</head>
<body>

<h1>Keke Finder</h1>

<div class="container">

<div class="box">
<h2>For Students</h2>
<p>Find available kekes near you instantly</p>
<button onclick="requestKeke()">I need a keke</button>
<p id="studentMsg"></p>
</div>

<div class="box">
<h2>For Riders</h2>
<p>Let students know where you are</p>
<button onclick="becomeAvailable()">I am available</button>
<p id="riderMsg"></p>
</div>

<div class="box">
<h2>Available Kekes</h2>
<ul id="kekeList"></ul>
</div>

</div>

<script src="script.js"></script>
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-app.js";
  import { getFirestore, collection, addDoc } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-firestore.js";
  import { getAuth } from "https://www.gstatic.com/firebasejs/12.12.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyD7B0wPIFFs3aGZL4kaAXSAfwixo08yDf4",
    authDomain: "keke-finder-cd5fe.firebaseapp.com",
    projectId: "keke-finder-cd5fe",
    storageBucket: "keke-finder-cd5fe.firebasestorage.app",
    messagingSenderId: "836112236677",
    appId: "1:836112236677:web:bd2a64d87f093a3230e9ec"
  };

  // Initialize Firebase
  const app = initializeApp(firebaseConfig);

  // Initialize services
  const db = getFirestore(app);
  const auth = getAuth(app);

  console.log("Firebase connected:", db);

  // TEST write (very important)
  async function testWrite() {
    try {
      await addDoc(collection(db, "test"), {
        message: "Keke app working",
        time: new Date()
      });
      console.log("Data saved");
    } catch (e) {
      console.error("Error:", e);
    }
  }

  testWrite();
</script>
</body>
</html>
