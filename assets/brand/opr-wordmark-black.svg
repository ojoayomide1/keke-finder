<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 310 96" role="img" aria-labelledby="title desc">
  <title id="title">OpRides wordmark</title>
  <desc id="desc">The OpRides icon beside a wordmark with OP upright and rides italic.</desc>
  <style>
    .icon{fill:none;stroke:#111;stroke-width:6;stroke-linecap:round;stroke-linejoin:round}
    .op{font-family:Poppins,Montserrat,"Space Grotesk",Arial,sans-serif;font-size:48px;font-weight:700;font-style:normal;fill:#111}
    .rides{font-family:Poppins,Montserrat,"Space Grotesk",Arial,sans-serif;font-size:48px;font-weight:400;font-style:italic;fill:#111}
  </style>
  <g class="icon">
    <path d="M14 32h22" />
    <path d="M8 48h28" />
    <path d="M14 64h22" />
